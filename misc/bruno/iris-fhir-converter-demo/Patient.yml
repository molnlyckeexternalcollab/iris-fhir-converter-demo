info:
  name: Patient
  type: http
  seq: 3

http:
  method: POST
  url: "{{http_base_url}}/proxy/fhir/Patient"
  headers:
    - name: Content-Type
      value: application/fhir+json
    - name: If-None-Exist
      value: identifier=http://your-org/patient-id|MUSK-ELON-001
  body:
    type: json
    data: |-
      {
        "resourceType": "Patient",
        "identifier": [
          {
            "system": "http://your-org/patient-id",
            "value": "MUSK-ELON-001"
          }
        ],
        "name": [
          {
            "family": "MUSK",
            "given": [
              "Elon"
            ]
          }
        ],
        "gender": "male",
        "birthDate": "1971-06-28"
      }
  auth: inherit

runtime:
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: |-
          const total = res.getBody().total;
          console.log("Patient count:", total);
        method: jsonq
      variable:
        name: ""
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Posts a new patient if none exists according to the identifier.
