services:
  iris:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iris
    depends_on:
      - webgateway
    environment:
      - ISC_CPF_MERGE_FILE=${APP_HOME}/merge.cpf
      - FHIR_SERVER_ENABLE=${FHIR_SERVER_ENABLE}
      - FHIR_SERVER_VERSION=${FHIR_SERVER_VERSION}
      - FHIR_SERVER_PATH=${FHIR_SERVER_PATH}
      - FHIR_SERVER_STRATEGY=${FHIR_SERVER_STRATEGY}
    hostname: iris
    networks:
      - iris-fhir-converter-demo
    ports:
      - name: superserver-port
        target: 1972
        # host_ip: 0.0.0.0
        # published: 1972
        protocol: tcp
      # Management portal is served via webgateway (port 8081), not the private web server.
      # http://localhost:8081/csp/sys/UtilHome.csp
      # http://localhost:8081/fhir/portal/patientlist.html
      # Port 52773 (private web server) is intentionally not published:
      #   - community image: PWS runs internally but is unused
      #   - licensed image 2023.2+: no PWS at all
      - name: hl7-tcp-inbound
        target: 62115
        host_ip: 0.0.0.0
        published: 62115
        protocol: tcp
    restart: always
    volumes:
      - .:${APP_HOME}

  webgateway:
    container_name: webgateway
    environment:
      - ISC_CSP_CONF_FILE=/webgateway/CSP.conf
      - ISC_CSP_INI_FILE=/webgateway/CSP.ini
    hostname: webgateway
    image: containers.intersystems.com/intersystems/webgateway:latest-em
    init: true
    networks:
      - iris-fhir-converter-demo
    ports:
      - name: webgateway-https
        target: 443
        host_ip: 0.0.0.0
        published: 443
        protocol: tcp
        app_protocol: https
      - name: webgateway-http
        target: 80
        host_ip: 0.0.0.0
        published: 8081
        protocol: tcp
        app_protocol: http
    volumes:
      - ./webgateway:/webgateway
      - ./webgateway/cert:/opt/cert

networks:
  iris-fhir-converter-demo:
